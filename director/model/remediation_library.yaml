schema_version: "1.2.0"
tasks:
  - task_id: common.audit_sentence_integrity
    title: Audit sentence integrity
    description: Assess whether candidate sentence datasets contain fragmented or low-quality rows before manual labeling.
    iteration_id: common
    phase_id: common/remediation
    kind: diagnostic
    depends_on: []
    inputs: []
    outputs:
      - artifact_id: sentence_integrity_report
        path: reports/data/sentence_integrity_report.json
        kind: report
        required: true
    preconditions: []
    quality_checks: []
    commands: []
    manual_handoff: false
    risks: [R1, R5]
    estimated_effort: 2
    risk_reduction: 8
    automation_level: partial
    on_fail: reroute
    reroute_to:
      - common.remediate_fragmented_sentences
      - common.resample_from_clean_sentence_pool
    evidence_required: true
    tags: [sentence_quality_gate]
    gate_class: data
  - task_id: common.remediate_fragmented_sentences
    title: Remediate fragmented sentence extraction
    description: Fix extraction or post-processing to reduce fragmented sentence rows before labeling or IRR.
    iteration_id: common
    phase_id: common/remediation
    kind: remediation
    depends_on: []
    inputs: []
    outputs:
      - artifact_id: remediation_report
        path: reports/data/fragmentation_fix_report.md
        kind: markdown
        required: true
    preconditions: []
    quality_checks: []
    commands: []
    manual_handoff: true
    risks: [R5, R7]
    estimated_effort: 6
    risk_reduction: 9
    automation_level: manual
    on_fail: block
    reroute_to: []
    evidence_required: true
    tags: [sentence_quality_remediation]
    gate_class: manual
  - task_id: common.resample_from_clean_sentence_pool
    title: Resample from clean sentence pool
    description: Rebuild labeling or IRR samples from a vetted clean subset when current sentence quality is inadequate.
    iteration_id: common
    phase_id: common/remediation
    kind: remediation
    depends_on: []
    inputs: []
    outputs:
      - artifact_id: resample_report
        path: reports/data/resample_report.json
        kind: report
        required: true
    preconditions: []
    quality_checks: []
    commands: []
    manual_handoff: true
    risks: [R1, R2, R5]
    estimated_effort: 5
    risk_reduction: 7
    automation_level: manual
    on_fail: block
    reroute_to: []
    evidence_required: true
    tags: [resampling]
    gate_class: manual
  - task_id: common.rebuild_split_registry
    title: Rebuild split registry
    description: Recreate frozen train and validation registries with hashes and leakage checks.
    iteration_id: common
    phase_id: common/remediation
    kind: remediation
    depends_on: []
    inputs: []
    outputs:
      - artifact_id: split_registry
        path: data/metadata/splits/split_registry_v1.json
        kind: json
        required: true
        fingerprint_required: true
    preconditions: []
    quality_checks: []
    commands: []
    manual_handoff: true
    risks: [R3, R6]
    estimated_effort: 4
    risk_reduction: 8
    automation_level: manual
    on_fail: block
    reroute_to: []
    evidence_required: true
    tags: [split_registry]
    gate_class: manual
  - task_id: common.recompute_artifact_manifest
    title: Recompute artifact manifest
    description: Rebuild hashes and metadata for produced datasets and model artifacts.
    iteration_id: common
    phase_id: common/remediation
    kind: remediation
    depends_on: []
    inputs: []
    outputs:
      - artifact_id: artifact_manifest
        path: reports/data/artifact_manifest.json
        kind: json
        required: true
        fingerprint_required: true
    preconditions: []
    quality_checks: []
    commands: []
    manual_handoff: true
    risks: [R4, R6]
    estimated_effort: 3
    risk_reduction: 6
    automation_level: manual
    on_fail: block
    reroute_to: []
    evidence_required: true
    tags: [provenance]
    gate_class: manual
