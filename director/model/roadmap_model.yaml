- iteration_id: '2'
  title: Scaled Label Expansion, Human IRR, and Modeling Readiness
  goal: Expand the 2024 development window to stakeholder scale, build a publication-grade
    adjudicated label set, validate the rubric with true human-human IRR, and gate
    retraining on explicit sufficiency criteria.
  entry_criteria:
  - Iteration 1 review approved.
  - Iteration 2 kickoff completed on iteration2/integration.
  - Iteration 2 expansion uses the external DataWork filing corpus, not legacy in-repo
    sentence exports.
  exit_criteria:
  - Sentence-pool expansion reaches 500 firms and at least 1,000 clean AI sentences
    in the 2024 candidate pool.
  - At least 500 adjudicated labels with at least 80 labels per class are available
    before retraining.
  - Human-human IRR exceeds 0.7 on a blinded 100+ sentence subset.
  - Split registry is frozen with zero held-out leakage and the modeling readiness
    report is published.
  - Iteration 2 review approved.
  phases:
  - phase_id: iteration2/kickoff-and-preflight
    title: Kickoff and Preflight
