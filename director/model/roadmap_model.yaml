schema_version: "1.2.0"
project:
  name: semantic-patterns
  description: Policy-gated roadmap for AI-washing pipeline transformation.
settings:
  active_horizon_iterations:
    - "1"
    - "2"
  optimizer_weights:
    unblock_value: 5
    critical_path_depth: 4
    risk_reduction: 3
    automation_bonus: 2
    manual_effort_penalty: 2
    precondition_gap_penalty: 4
    quality_failure_penalty: 5
  defaults:
    phase_execution_mode: phase_first
    proposal_only: true
    allow_cross_iteration_rewrite: true
    fragment_rate_threshold: 0.15
    active_source_window_id: active_2021_2024
    canonical_table_format: parquet
policies:
  - policy_id: heldout_frozen
    kind: dataset_freeze
    description: held_out_sentences.csv is evaluation-only.
    enforcement: hard
    targets:
      - data/validation/held_out_sentences.csv
    value: true
  - policy_id: human_human_irr_only
    kind: methodology
    description: IRR requires blinded human-human comparison.
    enforcement: hard
    targets:
      - iteration2/irr-and-adjudication
    value: true
  - policy_id: no_downstream_outcome_peeking
    kind: methodology
    description: Labeling and adjudication decisions must not use downstream outcomes.
    enforcement: hard
    targets:
      - iteration2/irr-and-adjudication
      - iteration5/results-generation
    value: true
  - policy_id: openai_assistive_only
    kind: model_governance
    description: API outputs are assistive until a later benchmark gate passes.
    enforcement: hard
    targets:
      - iteration1/rubric-and-api-bootstrap
      - iteration2/dataset-expansion-2024
      - iteration3/classifier-calibration
    value: assistive_only
  - policy_id: no_significance_optimization
    kind: analysis_governance
    description: Statistical significance is not an optimization target.
    enforcement: hard
    targets:
      - iteration5/results-generation
      - iteration5/robustness-and-sensitivity
    value: true
  - policy_id: split_registry_required_before_retraining
    kind: data_governance
    description: Retraining requires a frozen split registry with no held-out overlap.
    enforcement: hard
    targets:
      - iteration3/centroid-retraining
    value: true
  - policy_id: sentence_quality_gate_before_labeling
    kind: data_governance
    description: Sentence quality must pass before manual labeling begins.
    enforcement: hard
    targets:
      - iteration1/label-ops-bootstrap
      - iteration2/dataset-expansion-2024
    value: true
  - policy_id: sentence_quality_gate_before_irr
    kind: data_governance
    description: Sentence quality must pass before IRR work begins.
    enforcement: hard
    targets:
      - iteration2/irr-and-adjudication
    value: true
data_layers:
  - layer_id: source_index
    canonical_path: data/metadata/available_filings_index.csv
    format: csv
    required_fields: [cik, year, quarter, form, filename, path, source_root, index_timestamp, source_window_id]
    description: Canonical index over the external SEC corpus without copying raw filing bodies.
  - layer_id: manifest_registry
    canonical_path: data/manifests/manifests_metadata.json
    format: json
    required_fields: [manifest_id, selection_reason, sampling_seed]
    description: Reproducible filing and sentence manifests.
  - layer_id: sentence_table
    canonical_path: data/processed/sentences/year=YYYY/ai_sentences.parquet
    format: parquet
    required_fields: [sentence_id, sentence, sentence_norm, source_file, source_year, source_quarter, source_form, source_cik, sentence_index, extractor_version, keyword_version, manifest_id, integrity_flags, fragment_score]
    review_export_path: data/processed/sentences/year=YYYY/ai_sentences_sample.csv
    description: Canonical AI sentence table partitioned by year.
  - layer_id: split_registry
    canonical_path: data/metadata/splits/split_registry_v1.csv
    format: csv
    required_fields: [sentence_id, split, split_version, assignment_reason, seed, source_manifest_id]
    description: Frozen split registry independent of sentence storage.
  - layer_id: label_table
    canonical_path: data/labels/v1/labels_master.parquet
    format: parquet
    required_fields: [sentence_id, sentence, label, label_source, rater_id, is_uncertain, uncertainty_note, adjudicated_label, label_version]
    description: Canonical human and assistive label store.
  - layer_id: model_artifacts
    canonical_path: artifacts/models/<model_version>/
    format: mixed
    description: Embeddings, centroids, metadata, and evaluation outputs.
  - layer_id: classification_table
    canonical_path: data/processed/classifications/year=YYYY/model=<model_version>/classified_sentences.parquet
    format: parquet
    review_export_path: data/processed/classifications/year=YYYY/model=<model_version>/classified_sentences_sample.csv
    description: Canonical sentence-level predicted labels for active source windows.
  - layer_id: panel
    canonical_path: data/panels/panel_v1.parquet
    format: parquet
    review_export_path: data/panels/panel_v1.csv
    description: Analysis-ready firm-year panel.
source_windows:
  - source_window_id: active_2021_2024
    years: ["2021", "2022", "2023", "2024"]
    source_root_ref: env:SEC_SOURCE_DIR
    status: active
  - source_window_id: historical_2000_2020
    years: ["2000-2020"]
    source_root_ref: env:SEC_SOURCE_DIR
    status: deferred
    availability_condition:
      condition_id: historical_window_available
      kind: indexed_years_include
      target: data/metadata/source_windows.json
      operator: in
      expected: "<=2020"
      on_fail: reroute
      message: Historical years are not currently indexed in the active source window.
      reroute_to: []
tooling_policies:
  - policy_id: atlas_isolated_env
    tool: atlas
    mode: isolated_skill_env
    repo_root_uv_run_forbidden: true
    required_runner: ~/.codex/skills/atlas/scripts/atlas_cli.py
    wrapper_path: scripts/atlas_isolated.sh
    expected_repo_venv_python: "3.9"
    expected_repo_venv_home: anaconda3/bin
iterations:
  - iteration_id: "1"
    title: Foundation, Canonical Contracts, and Bounded 2024 Pilot
    goal: Establish canonical contracts, clean the execution surface, and build a bounded sentence-table pilot from 2024 10-K filings.
    phases:
      - phase_id: iteration1/baseline-asset-freeze
        title: Baseline Asset Freeze
        goal: Freeze current evaluation assets and classify duplicates or deprecations before new data work starts.
        lifecycle_state: planned
        canonical: true
        depends_on: []
        required_artifacts:
          - reports/validation/validation_asset_registry.json
        source_window_id: active_2021_2024
        tags: [data_contracts, validation_assets]
        tasks:
          - task_id: iteration1.assets.inventory_validation_assets
            title: Inventory validation assets
            description: Inventory and fingerprint existing held-out and labeled validation assets.
            iteration_id: "1"
            phase_id: iteration1/baseline-asset-freeze
            kind: diagnostic
            depends_on: []
            inputs:
              - artifact_id: heldout
                path: data/validation/held_out_sentences.csv
                kind: csv
                required: true
              - artifact_id: collected_cleaned
                path: data/validation/CollectedAiSentencesClassifiedCleaned.csv
                kind: csv
                required: true
              - artifact_id: hand_labeled_revised
                path: data/validation/hand_labeled_ai_sentences_with_embeddings_revised.csv
                kind: csv
                required: true
            outputs:
              - artifact_id: validation_asset_registry
                path: reports/validation/validation_asset_registry.json
                kind: json
                required: true
            preconditions:
              - condition_id: heldout_exists
                kind: artifact_exists
                target: data/validation/held_out_sentences.csv
                operator: "=="
                expected: true
                on_fail: block
                message: Held-out evaluation asset is missing.
                reroute_to: []
            quality_checks: []
            commands: []
            manual_handoff: false
            risks: [R3, R6]
            estimated_effort: 2
            risk_reduction: 8
            automation_level: partial
            on_fail: block
            reroute_to: []
            evidence_required: true
            tags: [asset_inventory, evaluation_fixture]
            gate_class: data
      - phase_id: iteration1/repo-hygiene-and-script-canon
        title: Repo Hygiene and Script Canon
        goal: Define canonical, transitional, and legacy scripts so the pipeline is understandable and maintainable.
        lifecycle_state: planned
        canonical: true
        depends_on:
          - iteration1/baseline-asset-freeze
        required_artifacts:
          - docs/director/script_registry.md
          - director/snapshots/script_inventory.json
        tags: [repo_hygiene, script_registry]
        tasks:
          - task_id: iteration1.repo.inventory_scripts
            title: Inventory scripts
            description: Catalog scripts under canonical, transitional, and legacy buckets.
            iteration_id: "1"
            phase_id: iteration1/repo-hygiene-and-script-canon
            kind: diagnostic
            depends_on: []
            inputs: []
            outputs:
              - artifact_id: script_inventory
                path: director/snapshots/script_inventory.json
                kind: json
                required: true
            preconditions: []
            quality_checks: []
            commands: []
            manual_handoff: false
            risks: [R7]
            estimated_effort: 2
            risk_reduction: 7
            automation_level: partial
            on_fail: block
            reroute_to: []
            evidence_required: true
            tags: [inventory]
            gate_class: ops
          - task_id: iteration1.repo.publish_script_registry
            title: Publish script registry
            description: Publish canonical entrypoints and legacy archive/removal intent.
            iteration_id: "1"
            phase_id: iteration1/repo-hygiene-and-script-canon
            kind: reporting
            depends_on:
              - iteration1.repo.inventory_scripts
            inputs:
              - artifact_id: script_inventory
                path: director/snapshots/script_inventory.json
                kind: json
                required: true
            outputs:
              - artifact_id: script_registry
                path: docs/director/script_registry.md
                kind: markdown
                required: true
            preconditions:
              - condition_id: script_inventory_exists
                kind: artifact_exists
                target: director/snapshots/script_inventory.json
                operator: "=="
                expected: true
                on_fail: block
                message: Script inventory must exist before publishing registry.
                reroute_to: []
            quality_checks: []
            commands: []
            manual_handoff: false
            risks: [R7]
            estimated_effort: 2
            risk_reduction: 6
            automation_level: partial
            on_fail: block
            reroute_to: []
            evidence_required: true
            tags: [documentation]
            gate_class: ops
      - phase_id: iteration1/tooling-isolation
        title: Tooling Isolation
        goal: Prevent Atlas and similar external tooling from mutating the repo runtime environment.
        lifecycle_state: planned
        canonical: true
        depends_on:
          - iteration1/repo-hygiene-and-script-canon
        required_artifacts:
          - docs/director/tooling_isolation.md
          - director/config/tooling_policy.yaml
        tags: [tooling, env_safety]
        tasks:
          - task_id: iteration1.tooling.publish_isolation_policy
            title: Publish tooling isolation policy
            description: Write Atlas and external tool isolation rules and wrapper expectations.
            iteration_id: "1"
            phase_id: iteration1/tooling-isolation
            kind: reporting
            depends_on: []
            inputs: []
            outputs:
              - artifact_id: tooling_policy_doc
                path: docs/director/tooling_isolation.md
                kind: markdown
                required: true
              - artifact_id: tooling_policy
                path: director/config/tooling_policy.yaml
                kind: file
                required: true
            preconditions: []
            quality_checks: []
            commands: []
            manual_handoff: false
            risks: [R4, R7]
            estimated_effort: 2
            risk_reduction: 7
            automation_level: partial
            on_fail: block
            reroute_to: []
            evidence_required: true
            tags: [atlas, env_safety]
            gate_class: ops
      - phase_id: iteration1/source-index-contract
        title: Source Index Contract
        goal: Make the external SEC root the canonical raw-source interface and record active source windows.
        lifecycle_state: planned
        canonical: true
        depends_on:
          - iteration1/tooling-isolation
        required_artifacts:
          - data/metadata/available_filings_index.csv
          - data/metadata/source_windows.json
          - reports/data/source_index_summary.json
        source_window_id: active_2021_2024
        tags: [source_index, external_sec]
        tasks:
          - task_id: iteration1.source.index_external_sec_root
            title: Index external SEC root
            description: Index the active external source window from SEC_SOURCE_DIR without copying raw filing bodies.
            iteration_id: "1"
            phase_id: iteration1/source-index-contract
            kind: build
            depends_on: []
            inputs: []
            outputs:
              - artifact_id: filings_index
                path: data/metadata/available_filings_index.csv
                kind: csv
                required: true
              - artifact_id: source_windows
                path: data/metadata/source_windows.json
                kind: json
                required: true
              - artifact_id: source_index_summary
                path: reports/data/source_index_summary.json
                kind: json
                required: true
            preconditions: []
            quality_checks: []
            commands: []
            manual_handoff: false
            risks: [R5]
            estimated_effort: 3
            risk_reduction: 8
            automation_level: partial
            on_fail: block
            reroute_to: []
            evidence_required: true
            tags: [source_index, source_window]
            gate_class: data
      - phase_id: iteration1/sentence-table-pilot-2024
        title: Sentence Table Pilot 2024
        goal: Build a bounded 2024 10-K pilot manifest and canonical sentence table.
        lifecycle_state: planned
        canonical: true
        depends_on:
          - iteration1/source-index-contract
        required_artifacts:
          - data/manifests/filings/pilot_2024_10k_v1.csv
          - data/processed/sentences/year=2024/ai_sentences.parquet
          - reports/data/pilot_2024_sentence_quality.json
          - data/processed/sentences/year=2024/ai_sentences_sample.csv
        source_window_id: active_2021_2024
        tags: [pilot, sentence_table]
        tasks:
          - task_id: iteration1.pilot.generate_2024_manifest
            title: Generate bounded 2024 manifest
            description: Generate a deterministic 2024 10-K filing manifest capped at 240 filings.
            iteration_id: "1"
            phase_id: iteration1/sentence-table-pilot-2024
            kind: build
            depends_on: []
            inputs:
              - artifact_id: filings_index
                path: data/metadata/available_filings_index.csv
                kind: csv
                required: true
            outputs:
              - artifact_id: pilot_manifest
                path: data/manifests/filings/pilot_2024_10k_v1.csv
                kind: csv
                required: true
            preconditions:
              - condition_id: filings_index_exists
                kind: artifact_exists
                target: data/metadata/available_filings_index.csv
                operator: "=="
                expected: true
                on_fail: block
                message: Source index must exist before pilot manifest generation.
                reroute_to: []
            quality_checks: []
            commands: []
            manual_handoff: false
            risks: [R5]
            estimated_effort: 3
            risk_reduction: 8
            automation_level: partial
            on_fail: block
            reroute_to: []
            evidence_required: true
            tags: [pilot_manifest]
            gate_class: data
          - task_id: iteration1.pilot.extract_sentence_table
            title: Extract canonical sentence table
            description: Extract AI-related sentences from the bounded 2024 pilot into canonical sentence tables.
            iteration_id: "1"
            phase_id: iteration1/sentence-table-pilot-2024
            kind: build
            depends_on:
              - iteration1.pilot.generate_2024_manifest
            inputs:
              - artifact_id: pilot_manifest
                path: data/manifests/filings/pilot_2024_10k_v1.csv
                kind: csv
                required: true
            outputs:
              - artifact_id: sentence_table_2024
                path: data/processed/sentences/year=2024/ai_sentences.parquet
                kind: parquet
                required: true
              - artifact_id: sentence_table_sample_2024
                path: data/processed/sentences/year=2024/ai_sentences_sample.csv
                kind: csv
                required: true
              - artifact_id: sentence_quality_report
                path: reports/data/pilot_2024_sentence_quality.json
                kind: json
                required: true
            preconditions:
              - condition_id: pilot_manifest_exists
                kind: artifact_exists
                target: data/manifests/filings/pilot_2024_10k_v1.csv
                operator: "=="
                expected: true
                on_fail: block
                message: Pilot manifest missing.
                reroute_to: []
            quality_checks: []
            commands: []
            manual_handoff: false
            risks: [R5, R6]
            estimated_effort: 4
            risk_reduction: 9
            automation_level: partial
            on_fail: block
            reroute_to: []
            evidence_required: true
            tags: [sentence_table, fragment_audit]
            gate_class: data
      - phase_id: iteration1/rubric-and-api-bootstrap
        title: Rubric and API Bootstrap
        goal: Prepare rubric v1 and bounded assistive API usage without promoting API output to canonical labels.
        lifecycle_state: planned
        canonical: true
        depends_on:
          - iteration1/sentence-table-pilot-2024
        required_artifacts:
          - docs/labeling_protocol.md
          - director/config/api_assistive_policy.yaml
          - reports/api/api_bootstrap_smoke_test.json
        source_window_id: active_2021_2024
        tags: [rubric, api_assistive]
        tasks: []
      - phase_id: iteration1/label-ops-bootstrap
        title: Label Ops Bootstrap
        goal: Generate the first clean labeling batch from the bounded pilot after sentence-quality gating.
        lifecycle_state: planned
        canonical: true
        depends_on:
          - iteration1/rubric-and-api-bootstrap
        required_artifacts:
          - data/labels/v1/labeling_batch_v1.parquet
          - data/labels/v1/labeling_batch_v1.csv
        source_window_id: active_2021_2024
        tags: [label_ops, sentence_quality_gate]
        tasks:
          - task_id: iteration1.shared.audit_sentence_integrity
            title: Audit sentence integrity
            description: Assess whether pilot-derived sentence datasets contain fragmented or low-quality rows before labeling.
            iteration_id: "1"
            phase_id: iteration1/label-ops-bootstrap
            kind: diagnostic
            depends_on: []
            inputs:
              - artifact_id: sentence_review_export
                path: data/processed/sentences/year=2024/ai_sentences_sample.csv
                kind: csv
                required: true
            outputs:
              - artifact_id: sentence_integrity_report
                path: reports/data/pilot_2024_sentence_quality.json
                kind: json
                required: true
            preconditions:
              - condition_id: sentence_review_export_exists
                kind: artifact_exists
                target: data/processed/sentences/year=2024/ai_sentences_sample.csv
                operator: "=="
                expected: true
                on_fail: block
                message: Sentence review export missing.
                reroute_to: []
            quality_checks:
              - condition_id: sentence_fragment_threshold
                kind: sentence_fragment_rate_lte
                target: data/processed/sentences/year=2024/ai_sentences_sample.csv
                operator: "<="
                expected: 0.15
                on_fail: reroute
                message: Pilot sentence fragmentation exceeds threshold.
                reroute_to:
                  - common.remediate_fragmented_sentences
                  - common.resample_from_clean_sentence_pool
            commands: []
            manual_handoff: false
            risks: [R1, R5]
            estimated_effort: 2
            risk_reduction: 9
            automation_level: partial
            on_fail: reroute
            reroute_to:
              - common.remediate_fragmented_sentences
              - common.resample_from_clean_sentence_pool
            evidence_required: true
            tags: [sentence_quality_gate]
            gate_class: data
          - task_id: iteration1.labels.prepare_labeling_batch
            title: Prepare first labeling batch
            description: Select clean candidate sentences and build the first labeling batch exports.
            iteration_id: "1"
            phase_id: iteration1/label-ops-bootstrap
            kind: build
            depends_on:
              - iteration1.shared.audit_sentence_integrity
            inputs:
              - artifact_id: sentence_table_2024
                path: data/processed/sentences/year=2024/ai_sentences.parquet
                kind: parquet
                required: true
            outputs:
              - artifact_id: labeling_batch_parquet
                path: data/labels/v1/labeling_batch_v1.parquet
                kind: parquet
                required: true
              - artifact_id: labeling_batch_csv
                path: data/labels/v1/labeling_batch_v1.csv
                kind: csv
                required: true
            preconditions:
              - condition_id: sentence_table_exists
                kind: artifact_exists
                target: data/processed/sentences/year=2024/ai_sentences.parquet
                operator: "=="
                expected: true
                on_fail: block
                message: Sentence table missing.
                reroute_to: []
            quality_checks: []
            commands: []
            manual_handoff: false
            risks: [R1, R2, R5]
            estimated_effort: 3
            risk_reduction: 8
            automation_level: partial
            on_fail: block
            reroute_to: []
            evidence_required: true
            tags: [label_batch]
            gate_class: data
      - phase_id: iteration1/diagnostics-nlp
        title: Historical Diagnostics Baseline
        goal: Preserved historical diagnostics work completed before roadmap-model v2.
        lifecycle_state: historical
        canonical: false
        depends_on: []
        required_artifacts:
          - reports/iteration1/phase0/baseline_report.md
        tags: [historical]
        tasks: []
      - phase_id: iteration1/label-expansion-recovery
        title: Superseded Recovery Label Expansion
        goal: Preserved recovery branch work completed before roadmap-model v2.
        lifecycle_state: superseded
        canonical: false
        depends_on: []
        required_artifacts:
          - reports/iteration1/phase1_recovery/qa_report.json
        tags: [superseded]
        tasks: []
      - phase_id: iteration1/irr-validation
        title: Superseded Recovery IRR Workflow
        goal: Preserved recovery IRR workflow completed before roadmap-model v2.
        lifecycle_state: superseded
        canonical: false
        depends_on: []
        required_artifacts:
          - reports/iteration1/phase2_irr/irr_status.json
        tags: [superseded]
        tasks: []
  - iteration_id: "2"
    title: Label Expansion, Human IRR, and Frozen Training Set
    goal: Build the first canonical human-labeled dataset, validate the rubric with true IRR, and freeze the split registry.
    phases:
      - phase_id: iteration2/dataset-expansion-2024
        title: Dataset Expansion 2024
        goal: Expand labeled coverage on clean pilot-derived sentences while keeping API use assistive only.
        lifecycle_state: planned
        canonical: true
        depends_on:
          - iteration1/label-ops-bootstrap
        required_artifacts:
          - data/labels/v1/labels_master.parquet
          - reports/labels/label_expansion_summary.json
        source_window_id: active_2021_2024
        tags: [label_expansion, assistive_api]
        tasks:
          - task_id: iteration2.labels.expand_dataset
            title: Expand canonical labels
            description: Run bounded human labeling workflow on clean pilot-derived sentences.
            iteration_id: "2"
            phase_id: iteration2/dataset-expansion-2024
            kind: manual
            depends_on: []
            inputs:
              - artifact_id: labeling_batch_csv
                path: data/labels/v1/labeling_batch_v1.csv
                kind: csv
                required: true
            outputs:
              - artifact_id: labels_master
                path: data/labels/v1/labels_master.parquet
                kind: parquet
                required: true
              - artifact_id: label_expansion_summary
                path: reports/labels/label_expansion_summary.json
                kind: json
                required: true
            preconditions:
              - condition_id: labeling_batch_exists
                kind: artifact_exists
                target: data/labels/v1/labeling_batch_v1.csv
                operator: "=="
                expected: true
                on_fail: block
                message: Labeling batch is missing.
                reroute_to: []
            quality_checks: []
            commands: []
            manual_handoff: true
            risks: [R1, R2, R3]
            estimated_effort: 8
            risk_reduction: 9
            automation_level: manual
            on_fail: block
            reroute_to: []
            evidence_required: true
            tags: [human_labeling]
            gate_class: manual
      - phase_id: iteration2/irr-and-adjudication
        title: IRR and Adjudication
        goal: Run true human-human IRR on a blinded subset and adjudicate disagreements.
        lifecycle_state: planned
        canonical: true
        depends_on:
          - iteration2/dataset-expansion-2024
        required_artifacts:
          - data/labels/v1/irr_subset.parquet
          - reports/labels/irr_report.json
          - data/labels/v1/adjudication.parquet
        source_window_id: active_2021_2024
        tags: [irr, adjudication, sentence_quality_gate]
        tasks:
          - task_id: iteration2.shared.audit_sentence_integrity
            title: Audit IRR sentence integrity
            description: Re-check sentence integrity before blinded IRR work starts.
            iteration_id: "2"
            phase_id: iteration2/irr-and-adjudication
            kind: diagnostic
            depends_on: []
            inputs:
              - artifact_id: labels_master_review
                path: data/labels/v1/labels_master_review.csv
                kind: csv
                required: true
            outputs:
              - artifact_id: irr_sentence_quality_report
