schema_version: 1.3.0
project:
  name: semantic-patterns
  description: Policy-gated roadmap for AI-washing pipeline transformation.
settings:
  active_horizon_iterations:
  - '1'
  - '2'
  optimizer_weights:
    unblock_value: 5
    critical_path_depth: 4
    risk_reduction: 3
    automation_bonus: 2
    manual_effort_penalty: 2
    precondition_gap_penalty: 4
    quality_failure_penalty: 5
  defaults:
    phase_execution_mode: phase_first
    proposal_only: true
    allow_cross_iteration_rewrite: true
    fragment_rate_threshold: 0.15
    active_source_window_id: active_2021_2024
    canonical_table_format: parquet
branching_policy:
  schema_version: 1.0.0
  integration_branch_template: iteration{iteration_id}/integration
  work_branch_template: iteration{iteration_id}/{slug}
  merge_target: main
  preferred_merge_strategy: ff_only_if_possible_else_pr_merge_commit
  require_review_approval_before_next_iteration: true
  require_review_approval_before_main_merge: true
  suggest_new_chat_at_iteration_boundary: true
  starter_prompt_required: true
  tag_template: iteration{iteration_id}-closeout
  closeout_validation_commands:
  - make bootstrap
  - make doctor
  - make format
  - make lint
  - .venv/bin/pytest -q
stakeholder_alignment:
  schema_version: 1.3.0
  source_artifact: docs/director/stakeholder_expectations.md
  active_development_scope: 2021-2024 public-filing development window
  publication_target_scope: all publicly traded firms
  desired_horizon: 20-year horizon when source availability permits
  methodology_hard_gates:
  - Validate the A/S/I methodology before committing to scaled downstream analysis.
  - IRR must be true human-human IRR on a blinded 100+ sentence subset.
  - IRR threshold must exceed 0.7 before centroid retraining.
  - held_out_sentences.csv remains frozen evaluation-only.
  - API outputs remain assistive-only and must not become canonical labels.
  data_hard_gates:
  - Iteration 2 sentence-pool expansion must target 500 firms.
  - Iteration 2 sentence-pool expansion must target 1-2k clean AI sentences.
  - Centroid retraining requires at least 500 adjudicated labels.
  - Centroid retraining requires at least 80 adjudicated labels per class.
  - ai_total merge integrity must be checked before panel and regression work.
  publication_hard_gates:
  - Publication package must include a literature differentiation table.
  - Publication package must include before/after classification examples.
  - Publication package must include robustness using patent mismatch x A/S ratio,
    job postings, lagged regressions, and industry FE/SIC buckets.
  - Release packaging must produce a paper/results package, not only pipeline artifacts.
  requirements:
  - requirement_id: validate_methodology_before_scale
    stakeholder: Kuntara
    priority: non-negotiable
    summary: Validate the new A/S/I classification approach before deeper investment
      in scaled execution.
    target_iteration: '2'
    source_refs:
    - email thread 2025-07-26
    mapped_phases:
    - iteration1/rubric-and-api-bootstrap
    - iteration2/irr-and-adjudication
    - iteration2/label-sufficiency-gate
    mapped_gates:
    - assistive_api_bootstrap_passed
    - human_human_irr_gt_0_7
    - label_sufficiency_before_retraining
  - requirement_id: true_human_irr_multi_rater
    stakeholder: Kuntara
    priority: non-negotiable
    summary: Use multiple human raters and true IRR rather than model-vs-label agreement.
    target_iteration: '2'
    source_refs:
    - email thread 2025-07-26
    - email thread 2025-08-27
    mapped_phases:
    - iteration2/irr-and-adjudication
    - iteration2/label-sufficiency-gate
    mapped_gates:
    - human_human_irr_only
    - human_human_irr_gt_0_7
  - requirement_id: scale_candidate_pool_to_500_firms
    stakeholder: Kuntara
    priority: publication-critical
    summary: Expand beyond the bootstrap pilot to a 500-firm candidate pool with roughly
      1-2k clean AI sentences.
    target_iteration: '2'
    source_refs:
    - email thread 2025-08-27
    - email thread 2025-09-08
    mapped_phases:
    - iteration2/sentence-pool-expansion-2024
    - iteration2/dataset-expansion-2024
    mapped_gates:
    - candidate_pool_500_firms
    - candidate_pool_clean_sentences_gte_1000
  - requirement_id: label_set_sufficiency_before_retraining
    stakeholder: Kuntara
    priority: publication-critical
    summary: Reach a publication-grade adjudicated label set before retraining, not
      just a small pilot.
    target_iteration: '2'
    source_refs:
    - email thread 2025-08-27
    - email thread 2025-09-08
    mapped_phases:
    - iteration2/dataset-expansion-2024
    - iteration2/irr-and-adjudication
    - iteration2/label-sufficiency-gate
    mapped_gates:
    - adjudicated_labels_gte_500
    - per_class_labels_gte_80
  - requirement_id: ai_total_merge_integrity
    stakeholder: Kuntara
    priority: non-negotiable
    summary: Fix and verify merge integrity, especially ai_total, before panel and
      regression work.
    target_iteration: '3'
    source_refs:
    - email thread 2025-08-27
    mapped_phases:
    - iteration3/classification-merge-integrity
    - iteration4/panel-assembly-2021-2024
    mapped_gates:
    - ai_total_merge_integrity
  - requirement_id: job_postings_robustness
    stakeholder: Kuntara
    priority: publication-critical
    summary: Include job postings as a robustness path in the publication pipeline.
    target_iteration: '4'
    source_refs:
    - email thread 2025-09-08
    - email thread 2025-10-13
    mapped_phases:
    - iteration4/job-postings-robustness-integration
    - iteration5/robustness-and-sensitivity
    mapped_gates:
    - job_postings_robustness_available
  - requirement_id: lagged_and_industry_robustness
    stakeholder: Kuntara
    priority: publication-critical
    summary: Run lagged regressions and industry FE or SIC-bucket robustness before
      publication packaging.
    target_iteration: '5'
    source_refs:
    - email thread 2025-10-13
    mapped_phases:
    - iteration5/regression-specification
    - iteration5/robustness-and-sensitivity
    mapped_gates:
    - lagged_regressions_included
    - industry_fe_or_sic_robustness_included
  - requirement_id: patent_mismatch_washing_proxy
    stakeholder: Kuntara
    priority: publication-critical
    summary: Include the patent-mismatch times A/S ratio washing proxy in the robustness
      package.
    target_iteration: '5'
    source_refs:
    - email thread 2025-09-08
    - email thread 2025-10-13
    mapped_phases:
    - iteration5/robustness-and-sensitivity
    mapped_gates:
    - patent_mismatch_as_ratio_robustness
  - requirement_id: literature_differentiation
    stakeholder: Kuntara
    priority: publication-critical
    summary: Document differentiation from nearby papers with a literature comparison
      table.
    target_iteration: '5'
    source_refs:
    - email thread 2025-07-26
    mapped_phases:
    - iteration5/literature-differentiation-and-examples
    - iteration5/release-packaging
    mapped_gates:
    - literature_differentiation_table_present
  - requirement_id: before_after_examples
    stakeholder: Kuntara
    priority: publication-critical
    summary: Provide before/after classification examples to make the method legible
      and defensible.
    target_iteration: '5'
    source_refs:
    - email thread 2025-07-26
    mapped_phases:
    - iteration5/literature-differentiation-and-examples
    - iteration5/release-packaging
    mapped_gates:
    - before_after_examples_present
  - requirement_id: publication_scope_all_public_firms
    stakeholder: Kuntara
    priority: preferred
    summary: Move toward all-public-firm and longer-horizon coverage as the publication
      target once source availability permits.
    target_iteration: '4'
    source_refs:
    - email thread 2025-10-13
    mapped_phases:
    - iteration4/historical-window-expansion-readiness
    - iteration5/results-generation
    mapped_gates:
    - publication_scope_plan_recorded
  - requirement_id: results_and_paper_package
    stakeholder: Kuntara
    priority: non-negotiable
    summary: Deliver a paper/results package, not only pipeline completion.
    target_iteration: '5'
    source_refs:
    - email thread 2025-11-01
    - email thread 2025-11-18
    mapped_phases:
    - iteration5/release-packaging
    mapped_gates:
    - results_package_present
policies:
- policy_id: heldout_frozen
  kind: dataset_freeze
  description: held_out_sentences.csv is evaluation-only.
  enforcement: hard
  targets:
  - data/validation/held_out_sentences.csv
  value: true
- policy_id: human_human_irr_only
  kind: methodology
  description: IRR requires blinded human-human comparison.
  enforcement: hard
  targets:
  - iteration2/irr-and-adjudication
  value: true
- policy_id: no_downstream_outcome_peeking
  kind: methodology
  description: Labeling and adjudication decisions must not use downstream outcomes.
  enforcement: hard
  targets:
  - iteration2/irr-and-adjudication
  - iteration5/results-generation
  value: true
- policy_id: openai_assistive_only
  kind: model_governance
  description: API outputs are assistive until a later benchmark gate passes.
  enforcement: hard
  targets:
  - iteration1/rubric-and-api-bootstrap
  - iteration2/dataset-expansion-2024
  - iteration3/classifier-calibration
  value: assistive_only
- policy_id: no_significance_optimization
  kind: analysis_governance
  description: Statistical significance is not an optimization target.
  enforcement: hard
  targets:
  - iteration5/results-generation
  - iteration5/robustness-and-sensitivity
  value: true
- policy_id: split_registry_required_before_retraining
  kind: data_governance
  description: Retraining requires a frozen split registry with no held-out overlap.
  enforcement: hard
  targets:
  - iteration3/centroid-retraining
  value: true
- policy_id: sentence_quality_gate_before_labeling
  kind: data_governance
  description: Sentence quality must pass before manual labeling begins.
  enforcement: hard
  targets:
  - iteration1/label-ops-bootstrap
  - iteration2/dataset-expansion-2024
  value: true
- policy_id: sentence_quality_gate_before_irr
  kind: data_governance
  description: Sentence quality must pass before IRR work begins.
  enforcement: hard
  targets:
  - iteration2/irr-and-adjudication
  value: true
- policy_id: human_human_irr_gt_0_7
  kind: methodology
  description: Canonical IRR must exceed 0.7 on a blinded 100+ sentence subset before
    retraining.
  enforcement: hard
  targets:
  - iteration2/irr-and-adjudication
  - iteration2/label-sufficiency-gate
  value:
    kappa_min: 0.7
    irr_subset_min: 100
- policy_id: label_sufficiency_before_retraining
  kind: data_governance
  description: Retraining requires a sufficiently large adjudicated label set with
    class balance.
  enforcement: hard
  targets:
  - iteration2/label-sufficiency-gate
  - iteration3/centroid-retraining
  value:
    adjudicated_labels_min: 500
    per_class_min: 80
- policy_id: merge_integrity_before_panel
  kind: data_governance
  description: ai_total and related merge keys must be verified before panel and regression
    work.
  enforcement: hard
  targets:
  - iteration3/classification-merge-integrity
  - iteration4/panel-assembly-2021-2024
  - iteration5/results-generation
  value: ai_total_required
- policy_id: publication_package_required
  kind: analysis_governance
  description: Publication release requires differentiation, examples, and the requested
    robustness suite.
  enforcement: hard
  targets:
  - iteration5/literature-differentiation-and-examples
  - iteration5/release-packaging
  value: true
data_layers:
- layer_id: source_index
  canonical_path: data/metadata/available_filings_index.csv
  format: csv
  required_fields:
  - cik
  - year
  - quarter
  - form
  - filename
  - path
  - source_root
  - index_timestamp
  - source_window_id
  description: Canonical index over the external SEC corpus without copying raw filing
    bodies.
- layer_id: manifest_registry
  canonical_path: data/manifests/manifests_metadata.json
  format: json
  required_fields:
  - manifest_id
  - selection_reason
  - sampling_seed
  description: Reproducible filing and sentence manifests.
- layer_id: sentence_table
  canonical_path: data/processed/sentences/year=YYYY/ai_sentences.parquet
  format: parquet
  required_fields:
  - sentence_id
  - sentence
  - sentence_norm
  - source_file
  - source_year
  - source_quarter
  - source_form
  - source_cik
  - sentence_index
  - extractor_version
  - keyword_version
  - manifest_id
  - integrity_flags
  - fragment_score
  review_export_path: data/processed/sentences/year=YYYY/ai_sentences_sample.csv
  description: Canonical AI sentence table partitioned by year.
- layer_id: split_registry
  canonical_path: data/metadata/splits/split_registry_v1.csv
  format: csv
  required_fields:
  - sentence_id
  - split
  - split_version
  - assignment_reason
  - seed
  - source_manifest_id
  description: Frozen split registry independent of sentence storage.
- layer_id: label_table
  canonical_path: data/labels/v1/labels_master.parquet
  format: parquet
  required_fields:
  - sentence_id
  - sentence
  - label
  - label_source
  - rater_id
  - is_uncertain
  - uncertainty_note
  - adjudicated_label
  - label_version
  description: Canonical human and assistive label store.
- layer_id: model_artifacts
  canonical_path: artifacts/models/<model_version>/
  format: mixed
  description: Embeddings, centroids, metadata, and evaluation outputs.
- layer_id: classification_table
  canonical_path: data/processed/classifications/year=YYYY/model=<model_version>/classified_sentences.parquet
  format: parquet
  review_export_path: data/processed/classifications/year=YYYY/model=<model_version>/classified_sentences_sample.csv
  description: Canonical sentence-level predicted labels for active source windows.
- layer_id: panel
  canonical_path: data/panels/panel_v1.parquet
  format: parquet
  review_export_path: data/panels/panel_v1.csv
  description: Analysis-ready firm-year panel.
source_windows:
- source_window_id: active_2021_2024
  years:
  - '2021'
  - '2022'
  - '2023'
  - '2024'
  source_root_ref: env:SEC_SOURCE_DIR
  status: active
- source_window_id: historical_2000_2020
  years:
  - 2000-2020
  source_root_ref: env:SEC_SOURCE_DIR
  status: deferred
  availability_condition:
    condition_id: historical_window_available
    kind: indexed_years_include
    target: data/metadata/source_windows.json
    operator: in
    expected: <=2020
    on_fail: reroute
    message: Historical years are not currently indexed in the active source window.
    reroute_to: []
tooling_policies:
- policy_id: atlas_isolated_env
  tool: atlas
  mode: isolated_skill_env
  repo_root_uv_run_forbidden: true
  required_runner: ~/.codex/skills/atlas/scripts/atlas_cli.py
  wrapper_path: scripts/atlas_isolated.sh
  expected_repo_venv_python: '3.9'
  expected_repo_venv_home: anaconda3/bin
iterations:
- iteration_id: '1'
  title: Foundation, Canonical Contracts, and Bounded 2024 Pilot
  goal: Establish canonical contracts, clean the execution surface, and build a bounded
    sentence-table pilot from 2024 10-K filings.
  entry_criteria:
  - Canonical roadmap model v2 is active and rendered.
  - Active source window 2021-2024 is available through SEC_SOURCE_DIR or local source-root
    config.
  exit_criteria:
  - Foundation phases passed through label-ops-bootstrap.
  - Iteration 1 review approved and closeout branch plan generated.
  phases:
  - phase_id: iteration1/kickoff-and-preflight
    title: Historical Kickoff and Preflight
    goal: Traceability-only placeholder for the retroactively introduced iteration
      kickoff boundary.
    lifecycle_state: historical
    canonical: false
    depends_on: []
    required_artifacts:
    - director/reviews/iteration_1_kickoff.json
    tags:
    - historical
    - kickoff
    tasks: []
  - phase_id: iteration1/baseline-asset-freeze
    title: Baseline Asset Freeze
    goal: Freeze current evaluation assets and classify duplicates or deprecations
      before new data work starts.
    lifecycle_state: planned
    canonical: true
    depends_on: []
    required_artifacts:
    - reports/validation/validation_asset_registry.json
    source_window_id: active_2021_2024
    tags:
    - data_contracts
    - validation_assets
    tasks:
    - task_id: iteration1.assets.inventory_validation_assets
      title: Inventory validation assets
      description: Inventory and fingerprint existing held-out and labeled validation
        assets.
      iteration_id: '1'
      phase_id: iteration1/baseline-asset-freeze
      kind: diagnostic
      depends_on: []
      inputs:
      - artifact_id: heldout
        path: data/validation/held_out_sentences.csv
        kind: csv
        required: true
      - artifact_id: collected_cleaned
        path: data/validation/CollectedAiSentencesClassifiedCleaned.csv
        kind: csv
        required: true
      - artifact_id: hand_labeled_revised
        path: data/validation/hand_labeled_ai_sentences_with_embeddings_revised.csv
        kind: csv
        required: true
      outputs:
      - artifact_id: validation_asset_registry
        path: reports/validation/validation_asset_registry.json
        kind: json
        required: true
      preconditions:
      - condition_id: heldout_exists
        kind: artifact_exists
        target: data/validation/held_out_sentences.csv
        operator: ==
        expected: true
        on_fail: block
        message: Held-out evaluation asset is missing.
        reroute_to: []
      quality_checks: []
      commands:
      - .venv/bin/python -m semantic_ai_washing.director.tasks.validation_assets --output
        reports/validation/validation_asset_registry.json
      manual_handoff: false
      risks:
      - R3
      - R6
      estimated_effort: 2
      risk_reduction: 8
      automation_level: partial
      on_fail: block
      reroute_to: []
      evidence_required: true
      tags:
      - asset_inventory
      - evaluation_fixture
      gate_class: data
  - phase_id: iteration1/repo-hygiene-and-script-canon
    title: Repo Hygiene and Script Canon
    goal: Define canonical, transitional, and legacy scripts so the pipeline is understandable
      and maintainable.
    lifecycle_state: planned
    canonical: true
    depends_on:
    - iteration1/baseline-asset-freeze
    required_artifacts:
    - docs/director/script_registry.md
    - director/snapshots/script_inventory.json
    tags:
    - repo_hygiene
    - script_registry
    tasks:
    - task_id: iteration1.repo.inventory_scripts
      title: Inventory scripts
      description: Catalog scripts under canonical, transitional, and legacy buckets.
      iteration_id: '1'
      phase_id: iteration1/repo-hygiene-and-script-canon
      kind: diagnostic
      depends_on: []
      inputs: []
      outputs:
      - artifact_id: script_inventory
        path: director/snapshots/script_inventory.json
        kind: json
        required: true
      preconditions: []
      quality_checks: []
      commands:
      - .venv/bin/python -m semantic_ai_washing.director.tasks.script_inventory --mode
        inventory --output-inventory director/snapshots/script_inventory.json
      manual_handoff: false
      risks:
      - R7
      estimated_effort: 2
      risk_reduction: 7
      automation_level: partial
      on_fail: block
      reroute_to: []
      evidence_required: true
      tags:
      - inventory
      gate_class: ops
    - task_id: iteration1.repo.publish_script_registry
      title: Publish script registry
      description: Publish canonical entrypoints and legacy archive/removal intent.
      iteration_id: '1'
      phase_id: iteration1/repo-hygiene-and-script-canon
      kind: reporting
      depends_on:
      - iteration1.repo.inventory_scripts
      inputs:
      - artifact_id: script_inventory
        path: director/snapshots/script_inventory.json
        kind: json
        required: true
      outputs:
      - artifact_id: script_registry
        path: docs/director/script_registry.md
        kind: markdown
        required: true
      preconditions:
      - condition_id: script_inventory_exists
        kind: artifact_exists
        target: director/snapshots/script_inventory.json
        operator: ==
        expected: true
        on_fail: block
        message: Script inventory must exist before publishing registry.
        reroute_to: []
      quality_checks: []
      commands:
      - .venv/bin/python -m semantic_ai_washing.director.tasks.script_inventory --mode
        publish --input-inventory director/snapshots/script_inventory.json --output-registry
        docs/director/script_registry.md
      manual_handoff: false
      risks:
      - R7
      estimated_effort: 2
      risk_reduction: 6
      automation_level: partial
      on_fail: block
      reroute_to: []
      evidence_required: true
      tags:
      - documentation
      gate_class: ops
  - phase_id: iteration1/tooling-isolation
    title: Tooling Isolation
    goal: Prevent Atlas and similar external tooling from mutating the repo runtime
      environment.
    lifecycle_state: planned
    canonical: true
    depends_on:
    - iteration1/repo-hygiene-and-script-canon
    required_artifacts:
    - docs/director/tooling_isolation.md
    - director/config/tooling_policy.yaml
    tags:
    - tooling
    - env_safety
    tasks:
    - task_id: iteration1.tooling.publish_isolation_policy
      title: Publish tooling isolation policy
      description: Write Atlas and external tool isolation rules and wrapper expectations.
      iteration_id: '1'
      phase_id: iteration1/tooling-isolation
      kind: reporting
      depends_on: []
      inputs: []
      outputs:
      - artifact_id: tooling_policy_doc
        path: docs/director/tooling_isolation.md
        kind: markdown
        required: true
      - artifact_id: tooling_policy
        path: director/config/tooling_policy.yaml
        kind: file
        required: true
      preconditions: []
      quality_checks: []
      commands: []
      manual_handoff: false
      risks:
      - R4
      - R7
      estimated_effort: 2
      risk_reduction: 7
      automation_level: partial
      on_fail: block
      reroute_to: []
      evidence_required: true
      tags:
      - atlas
      - env_safety
      gate_class: ops
  - phase_id: iteration1/source-index-contract
    title: Source Index Contract
    goal: Make the external SEC root the canonical raw-source interface and record
      active source windows.
    lifecycle_state: planned
    canonical: true
    depends_on:
    - iteration1/tooling-isolation
    required_artifacts:
    - data/metadata/available_filings_index.csv
    - data/metadata/source_windows.json
    - reports/data/source_index_summary.json
    source_window_id: active_2021_2024
    tags:
    - source_index
    - external_sec
    tasks:
    - task_id: iteration1.source.index_external_sec_root
      title: Index external SEC root
      description: Index the active external source window from SEC_SOURCE_DIR without
        copying raw filing bodies.
      iteration_id: '1'
      phase_id: iteration1/source-index-contract
      kind: build
      depends_on: []
      inputs: []
      outputs:
      - artifact_id: filings_index
        path: data/metadata/available_filings_index.csv
        kind: csv
        required: true
      - artifact_id: source_windows
        path: data/metadata/source_windows.json
        kind: json
        required: true
      - artifact_id: source_index_summary
        path: reports/data/source_index_summary.json
        kind: json
        required: true
      preconditions: []
      quality_checks: []
      commands:
      - .venv/bin/python -m semantic_ai_washing.data.index_sec_filings --output-csv
        data/metadata/available_filings_index.csv --output-source-windows data/metadata/source_windows.json
        --output-summary reports/data/source_index_summary.json
      manual_handoff: false
      risks:
      - R5
      estimated_effort: 3
      risk_reduction: 8
      automation_level: partial
      on_fail: block
      reroute_to: []
      evidence_required: true
      tags:
      - source_index
      - source_window
      gate_class: data
  - phase_id: iteration1/sentence-table-pilot-2024
    title: Sentence Table Pilot 2024
    goal: Build a bounded 2024 10-K pilot manifest and canonical sentence table.
    lifecycle_state: planned
    canonical: true
    depends_on:
    - iteration1/source-index-contract
    required_artifacts:
    - data/manifests/filings/pilot_2024_10k_v1.csv
    - data/processed/sentences/year=2024/ai_sentences.parquet
    - reports/data/pilot_2024_sentence_quality.json
    - data/processed/sentences/year=2024/ai_sentences_sample.csv
    source_window_id: active_2021_2024
    tags:
    - pilot
    - sentence_table
